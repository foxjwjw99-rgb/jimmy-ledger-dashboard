<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jimmy Ledger Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>

    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --border:#e2e8f0;
      --text:#0f172a;
      --muted:#64748b;
      --accent:#4f46e5;
      --danger:#ef4444;
      --success:#16a34a;
      --shadow: 0 1px 2px rgba(15,23,42,.06), 0 10px 30px rgba(15,23,42,.08);
      --radius:14px;
    }

    *{box-sizing:border-box;margin:0;padding:0;}
    html{color-scheme:light;}
    body{
      font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans TC","PingFang TC",sans-serif;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      line-height:1.45;
    }

    .container{max-width:1040px;margin:0 auto;padding:28px 16px;}
    h1{font-size:1.55rem;font-weight:750;letter-spacing:-.02em;margin-bottom:6px;}
    .subtitle{color:var(--muted);font-size:.9rem;margin-bottom:18px;}

    .filter-bar{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:14px;
      margin-bottom:16px;
      box-shadow:var(--shadow);
    }

    .filter-buttons{display:flex;flex-wrap:wrap;gap:8px;}
    .filter-dates{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:12px;}
    .filter-dates label{font-size:.85rem;color:#475569;display:flex;gap:8px;align-items:center;}

    input[type="date"]{
      border:1px solid var(--border);
      border-radius:12px;
      padding:9px 10px;
      background:#fff;
      color:var(--text);
      font-variant-numeric:tabular-nums;
    }
    input[type="date"]:focus{outline:none;}

    button{font-family:inherit;}
    .pill{
      appearance:none;
      border:1px solid var(--border);
      background:#fff;
      color:var(--text);
      border-radius:999px;
      padding:9px 12px;
      font-size:.88rem;
      cursor:pointer;
      transition:background .15s ease,border-color .15s ease,color .15s ease,transform .05s ease;
    }
    .pill:hover{background:#f8fafc;border-color:#cbd5e1;}
    .pill:active{transform:translateY(1px);}
    .pill.active{background:var(--accent);color:#fff;border-color:var(--accent);}
    .pill:focus-visible{outline:3px solid rgba(79,70,229,.25);outline-offset:2px;}

    .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:18px;}
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:18px 18px 16px;
      box-shadow:var(--shadow);
    }
    .card .label{font-size:.82rem;color:var(--muted);margin-bottom:8px;}
    .card .value{font-size:1.75rem;font-weight:760;letter-spacing:-.02em;font-variant-numeric:tabular-nums;}
    .card .value.positive{color:var(--success);}
    .card .value.negative{color:var(--danger);}

    .budget-section{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:18px;
      margin-bottom:18px;
      box-shadow:var(--shadow);
    }
    .budget-header{display:flex;justify-content:space-between;gap:12px;align-items:baseline;margin-bottom:10px;}
    .budget-header h2{font-size:1rem;font-weight:650;}
    .budget-header .budget-nums{font-size:.9rem;color:var(--muted);font-variant-numeric:tabular-nums;}
    .progress-track{background:#e2e8f0;border-radius:999px;height:12px;overflow:hidden;}
    .progress-fill{height:100%;border-radius:999px;transition:width .4s ease;}

    .chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px;}
    @media(max-width:680px){.chart-grid{grid-template-columns:1fr;}}
    .chart-card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:18px;
      box-shadow:var(--shadow);
    }
    .chart-card h2{font-size:.98rem;font-weight:650;margin-bottom:12px;}
    .chart-card canvas{width:100%!important;max-height:280px;}

    .table-section{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:18px;
      margin-bottom:18px;
      box-shadow:var(--shadow);
    }
    .table-section h2{font-size:.98rem;font-weight:650;margin-bottom:12px;}

    table{width:100%;border-collapse:collapse;}
    th{
      text-align:left;
      font-size:.8rem;
      color:var(--muted);
      padding:10px 10px 10px 0;
      border-bottom:1px solid var(--border);
      font-weight:650;
    }
    td{
      padding:10px 10px 10px 0;
      border-bottom:1px solid #f1f5f9;
      font-size:.92rem;
      color:var(--text);
    }
    tbody tr:hover{background:#f8fafc;}

    #cats th:last-child,
    #cats td:last-child,
    #days th:nth-child(2),
    #days td:nth-child(2),
    #days th:nth-child(3),
    #days td:nth-child(3){
      text-align:right;
      font-variant-numeric:tabular-nums;
    }

    .muted{color:#94a3b8;}
  
  </style>
</head>
<body>
<div class="container">
  <h1>Jimmy Ledger Dashboard</h1>
  <p class="subtitle">Public read-only view &mdash; data generated from private repo via GitHub Actions.</p>

  <div class="filter-bar" style="margin-bottom:12px;">
    <div class="filter-buttons" id="personButtons">
      <button class="pill" data-person="jimmy">Jimmy</button>
      <button class="pill" data-person="winnie">Winnie</button>
    </div>
    <div class="filter-meta muted" id="personLabel" style="margin-top:8px;"></div>
  </div>

  <div class="filter-bar">
    <div class="filter-buttons">
      <button class="pill" data-range="today">今天</button>
      <button class="pill" data-range="week">本週</button>
      <button class="pill" data-range="month">本月</button>
      <button class="pill" data-range="last30">近 30 天</button>
    </div>
    <div class="filter-dates">
      <label>起日 <input type="date" id="fromDate" /></label>
      <span class="muted" style="padding:0 6px;">～</span>
      <label>迄日 <input type="date" id="toDate" /></label>
      <button class="pill" id="applyCustom">套用</button>
    </div>
    <div class="filter-meta muted" id="rangeLabel" style="margin-top:8px;"></div>
  </div>

  <div class="cards" id="cards"></div>

  <div class="budget-section" id="budget-section" style="display:none;">
    <div class="budget-header">
      <h2>預算進度</h2>
      <span class="budget-nums" id="budget-nums"></span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  </div>

  <div class="chart-grid">
    <div class="chart-card">
      <h2 id="lineTitle">近 14 天（支出 / 收入）</h2>
      <canvas id="lineChart"></canvas>
    </div>
    <div class="chart-card">
      <h2 id="catTitle">分類支出占比</h2>
      <canvas id="doughnutChart"></canvas>
    </div>
  </div>

  <div class="table-section">
    <h2 id="topCatTitle">Top Categories</h2>
    <table id="cats"><thead><tr><th>分類</th><th>支出</th></tr></thead><tbody></tbody></table>
  </div>

  <div class="table-section">
    <h2 id="daysTitle">近 14 天明細</h2>
    <table id="days"><thead><tr><th>日期</th><th>支出</th><th>收入</th></tr></thead><tbody></tbody></table>
  </div>
</div>

<script>
function n(v){ return Math.round(v).toLocaleString('en-US'); }

const COLORS = ['#6366f1','#f59e0b','#10b981','#ef4444','#8b5cf6','#ec4899','#14b8a6','#f97316'];

let lineChart, doughnutChart;

function setActivePerson(person){
  document.querySelectorAll('.pill[data-person]').forEach(b => {
    b.classList.toggle('active', b.dataset.person === person);
  });
}

function setActiveRange(range){
  document.querySelectorAll('.pill[data-range]').forEach(b => {
    b.classList.toggle('active', b.dataset.range === range);
  });
}

function qs(obj){
  const p = new URLSearchParams();
  for (const [k,v] of Object.entries(obj)){
    if (v === undefined || v === null || v === '') continue;
    p.set(k, v);
  }
  const s = p.toString();
  return s ? ('?'+s) : '';
}

async function loadSummary(params){
  // Static daily aggregates (month shard)
  const TZ = 'Asia/Taipei';
  function ymNow(){
    const parts = new Intl.DateTimeFormat('en-CA', { timeZone: TZ, year:'numeric', month:'2-digit' }).formatToParts(new Date());
    const get = (t) => parts.find(p => p.type === t)?.value;
    return `${get('year')}-${get('month')}`;
  }
  function prevYm(ym){
    const [y,m]=ym.split('-').map(Number);
    const d = new Date(Date.UTC(y, m-1, 1));
    d.setUTCMonth(d.getUTCMonth()-1);
    return d.toISOString().slice(0,7);
  }

  async function fetchDaily(ym, person){
    const res = await fetch(`./api/daily-${ym}-${person}.json`);
    if (!res.ok) return null;
    return await res.json();
  }

  const person = (params?.person || 'jimmy').toString();

  let daily = await fetchDaily(ymNow(), person);
  if (!daily) daily = await fetchDaily(prevYm(ymNow()), person);
  if (!daily) throw new Error('Missing daily data JSON');

  // helpers
  const days = daily.days || [];
  const tz = daily.timezone || 'Asia/Taipei';

  function ymdNow(){
    const parts = new Intl.DateTimeFormat('en-CA', { timeZone: tz, year:'numeric', month:'2-digit', day:'2-digit'}).formatToParts(new Date());
    const get = (t) => parts.find(p => p.type === t)?.value;
    return `${get('year')}-${get('month')}-${get('day')}`;
  }
  function ymdToUtcDate(ymd){
    const [y,m,d]=ymd.split('-').map(Number);
    return new Date(Date.UTC(y, m-1, d));
  }
  function addDaysYmd(ymd, delta){
    const dt = ymdToUtcDate(ymd);
    dt.setUTCDate(dt.getUTCDate()+delta);
    return dt.toISOString().slice(0,10);
  }
  function endOfMonthYmd(ym){
    const [y,m]=ym.split('-').map(Number);
    const dt = new Date(Date.UTC(y, m, 0));
    return dt.toISOString().slice(0,10);
  }
  function weekStartMondayYmd(ymd){
    const dt = ymdToUtcDate(ymd);
    const dow = dt.getUTCDay();
    const delta = (dow + 6) % 7; // Mon->0, Sun->6
    return addDaysYmd(ymd, -delta);
  }
  function clampRange(from,to){
    if (from && to && from>to) return {from:to,to:from};
    return {from,to};
  }

  // resolve range
  const today = ymdNow();
  let range = (params?.range||'').toString();
  let from = params?.from?.toString();
  let to = params?.to?.toString();

  if (from || to){
    from = from || to || today;
    to = to || from || today;
    ({from,to} = clampRange(from,to));
    range = 'custom';
  } else if (range === 'today'){
    from = to = today;
  } else if (range === 'week'){
    from = weekStartMondayYmd(today);
    to = addDaysYmd(from, 6);
  } else if (range === 'last30'){
    to = today;
    from = addDaysYmd(today, -29);
  } else {
    // month default (month-to-date)
    const ym = (today||'').slice(0,7);
    from = `${ym}-01`;
    to = today;
    range = 'month';
  }

  // build day map for quick lookup
  const byDay = new Map(days.map(d => [d.day, d]));
  let expense=0, income=0;
  const byDaySeries=[];
  for (let d=from; d<=to; d=addDaysYmd(d,1)){
    const row = byDay.get(d) || {expense:0,income:0};
    expense += Number(row.expense||0);
    income += Number(row.income||0);
    byDaySeries.push({day:d, expense:Number(row.expense||0), income:Number(row.income||0)});
  }

  // Display recent 14 days up to the selected end date (avoid future zeros)
  const last14Days = byDaySeries.filter(x => x.day <= to).slice(-14);

  // Use monthly topCategories from daily file (safe + cheap)
  const topCategories = daily.topCategories || [];

  return {
    person,
    range: { from, to, label: range==='custom' ? `${from} ~ ${to}` : (range==='today'?'今天': range==='week'?'本週（週一～週日）': range==='last30'?'近 30 天': `本月（${from.slice(0,7)}）`) },
    ymBudget: daily.ym,
    expense,
    income,
    net: income-expense,
    budgetTotal: daily.budgetTotal || 0,
    budgetMonthExpense: daily.budgetMonthExpense || 0,
    budgetRemaining: daily.budgetRemaining || 0,
    topCategories,
    last14Days,
    chart: {
      dayLabels: last14Days.map(x=>x.day),
      dayExpenses: last14Days.map(x=>x.expense),
      dayIncomes: last14Days.map(x=>x.income),
      catLabels: topCategories.map(x=>x.category),
      catValues: topCategories.map(x=>x.expense),
    }
  };
}



function render(j){
  // Range label
  const rangeText = j?.range?.label ? `範圍：${j.range.label}` : '';
  document.getElementById('rangeLabel').textContent = rangeText;

  const personText = (j?.person === 'winnie') ? '目前視角：Winnie' : '目前視角：Jimmy';
  const pl = document.getElementById('personLabel');
  if (pl) pl.textContent = personText;

  if (j?.range?.from) document.getElementById('fromDate').value = j.range.from;
  if (j?.range?.to) document.getElementById('toDate').value = j.range.to;

  // Cards
  const cards = document.getElementById('cards');
  const items = [
    {label:'支出', value:'NT$ '+n(j.expense), cls:'negative'},
    {label:'收入', value:'NT$ '+n(j.income), cls:'positive'},
    {label:'結餘', value:'NT$ '+n(j.net), cls: j.net>=0?'positive':'negative'},
  ];
  cards.innerHTML = items.map(c =>
    '<div class="card"><div class="label">'+c.label+'</div><div class="value '+c.cls+'">'+c.value+'</div></div>'
  ).join('');

  // Titles
  document.getElementById('lineTitle').textContent = '近 14 天（支出 / 收入）';
  document.getElementById('catTitle').textContent = '分類支出占比';
  document.getElementById('topCatTitle').textContent = 'Top Categories';
  document.getElementById('daysTitle').textContent = '近 14 天明細';

  // Budget progress (always month-based)
  const sec = document.getElementById('budget-section');
  if (j.budgetTotal > 0){
    sec.style.display = '';
    const spent = j.budgetMonthExpense;
    const total = j.budgetTotal;
    const remaining = j.budgetRemaining;
    const pct = Math.min(100, Math.round((spent/total)*100));
    document.getElementById('budget-nums').textContent =
      `本月（${j.ymBudget}）已花 NT$ ${n(spent)} / NT$ ${n(total)} — 剩餘 NT$ ${n(remaining)}`;
    const fill = document.getElementById('progress-fill');
    fill.style.width = pct+'%';
    fill.style.background = pct > 90 ? '#dc2626' : pct > 70 ? '#f59e0b' : '#16a34a';
  } else {
    sec.style.display = 'none';
  }

  // Charts (destroy before re-render)
  if (lineChart) lineChart.destroy();
  if (doughnutChart) doughnutChart.destroy();

  const lineCtx = document.getElementById('lineChart').getContext('2d');
  lineChart = new Chart(lineCtx, {
    type:'line',
    data:{
      labels: j.chart.dayLabels.map(d => d.slice(5)),
      datasets:[
        {label:'支出', data:j.chart.dayExpenses, borderColor:'#ef4444', backgroundColor:'rgba(239,68,68,.1)', fill:true, tension:.3},
        {label:'收入', data:j.chart.dayIncomes, borderColor:'#16a34a', backgroundColor:'rgba(22,163,74,.1)', fill:true, tension:.3},
      ]
    },
    options:{responsive:true, plugins:{legend:{position:'bottom'}}, scales:{y:{beginAtZero:true}}}
  });

  const dCtx = document.getElementById('doughnutChart').getContext('2d');
  doughnutChart = new Chart(dCtx, {
    type:'doughnut',
    data:{
      labels: j.chart.catLabels,
      datasets:[{data:j.chart.catValues, backgroundColor:COLORS.slice(0,j.chart.catLabels.length)}]
    },
    options:{responsive:true, plugins:{legend:{position:'bottom'}}}
  });

  // Tables
  const catBody = document.querySelector('#cats tbody');
  catBody.innerHTML = j.topCategories.map(x =>
    '<tr><td>'+x.category+'</td><td>NT$ '+n(x.expense)+'</td></tr>'
  ).join('') || '<tr><td colspan="2" class="muted">No data</td></tr>';

  const dayBody = document.querySelector('#days tbody');
  dayBody.innerHTML = j.last14Days.map(x =>
    '<tr><td>'+x.day+'</td><td>NT$ '+n(x.expense)+'</td><td>NT$ '+n(x.income)+'</td></tr>'
  ).join('') || '<tr><td colspan="3" class="muted">No data</td></tr>';
}

async function main(){
  // Default
  let currentRange = 'month';
  let currentPerson = 'jimmy';
  setActiveRange(currentRange);
  setActivePerson(currentPerson);

  const j = await loadSummary({ range: currentRange, person: currentPerson });
  render(j);

  // Quick range buttons
  document.querySelectorAll('.pill[data-range]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const r = btn.dataset.range;
      setActiveRange(r);
      currentRange = r;
      const jj = await loadSummary({ range: r, person: currentPerson });
      render(jj);
    });
  });


  // Person switch
  document.querySelectorAll('.pill[data-person]').forEach(btn => {
    btn.addEventListener('click', async () => {
      currentPerson = btn.dataset.person;
      setActivePerson(currentPerson);
      const jj = await loadSummary({ range: currentRange, from: document.getElementById('fromDate').value, to: document.getElementById('toDate').value, person: currentPerson });
      render(jj);
    });
  });

  // Custom range
  document.getElementById('applyCustom').addEventListener('click', async () => {
    setActiveRange('');
    const from = document.getElementById('fromDate').value;
    const to = document.getElementById('toDate').value;
    currentRange = 'custom';
    const jj = await loadSummary({ from, to, person: currentPerson });
    render(jj);
  });
}

main();
</script>
</body>
</html>
